name: LSM VBA Build & Audit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PowerShell
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Verify VBA Source Files
      shell: pwsh
      run: |
        $basCount = (Get-ChildItem src\*.bas).Count
        $frmCount = (Get-ChildItem src\*.frm).Count
        Write-Host "Found $basCount .bas files and $frmCount .frm files"
        if ($basCount -lt 15) { throw "Expected at least 15 .bas files" }
        if ($frmCount -lt 1) { throw "Expected at least 1 .frm file" }

    - name: Syntax Check VBA Modules
      shell: pwsh
      run: |
        $errors = @()
        foreach ($f in Get-ChildItem src\*.bas, src\*.frm) {
          $content = Get-Content $f.FullName -Raw
          # Check for common VBA syntax issues
          if ($content -match "Exit\s+Sub" -and (Select-String -Path $f.FullName -Pattern "^\s*(Public|Private)\s+Function\s+" -AllMatches)) {
            $errors += "$f contains Exit Sub in a Function module"
          }
          if ($content -match "Attribute\s+VB_Name" -and $f.Name -match "\.frm$") {
            # .frm files can have Attribute VB_Name
            continue
          }
        }
        if ($errors.Count -gt 0) {
          Write-Host "Potential issues found:" -ForegroundColor Yellow
          $errors | ForEach-Object { Write-Host "  - $_" }
        } else {
          Write-Host "No syntax issues detected" -ForegroundColor Green
        }

    - name: Check Module Dependencies
      shell: pwsh
      run: |
        $callGraph = @{}
        foreach ($f in Get-ChildItem src\*.bas) {
          $name = [System.IO.Path]::GetFileNameWithoutExtension($f.Name)
          $content = Get-Content $f.FullName -Raw
          $calls = [regex]::Matches($content, "mod_\w+\.") | ForEach-Object { $_.Value.TrimEnd('.') } | Select-Object -Unique
          $callGraph[$name] = @($calls)
        }
        Write-Host "Module call graph:" -ForegroundColor Cyan
        foreach ($key in $callGraph.Keys | Sort-Object) {
          $deps = $callGraph[$key] -join ", "
          Write-Host "  $key → [$deps]"
        }

    - name: Audit Report
      shell: pwsh
      run: |
        Write-Host "=== LSM VBA Core Audit ===" -ForegroundColor Cyan
        $modules = Get-ChildItem src\*.bas, src\*.frm
        $totalLines = 0
        foreach ($m in $modules) {
          $lines = (Get-Content $m.FullName).Count
          $totalLines += $lines
        }
        Write-Host "Modules: $($modules.Count)" -ForegroundColor Green
        Write-Host "Total Lines: $totalLines" -ForegroundColor Green
        Write-Host "Source Files: OK" -ForegroundColor Green
